workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
      groups:
        - Lakeside
    scripts:
      - npm install
      - npx cap sync android
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - pieroquadri@gmail.com

  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
    scripts:
      - npm install
      - npx cap sync ios
      - cd ios/App && pod install
    artifacts:
      - ios/App/build/**/*.ipa
