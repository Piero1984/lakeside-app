workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
      groups:
        - Lakeside
    scripts:
      - npm install
      - npx cap sync android
      - |
          cd android
          echo $CM_KEYSTORE | base64 --decode > lakeside-smash.keystore
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/lakeside-smash.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - pieroquadri@gmail.com

  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic CI Lakeside
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: it.lakesidesmash.app
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
